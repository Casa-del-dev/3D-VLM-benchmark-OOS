name: 3d_vision
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - ffmpeg
  - imagemagick

  - numpy
  - scipy
  - pandas
  - matplotlib
  - jupyterlab
  - ipykernel

  - pip:
      - requests==2.32.3
      - pillow==10.4.0
      - tqdm==4.66.5
      - pyyaml==6.0.2

      # PyTorch stack
      - torch==2.11.0
      - torchvision==0.26.0

      # Vision / detection
      - opencv-python==4.13.0.92
      - transformers==5.5.3

      # 3D mesh processing / ray-casting (geometric visibility stage)
      # pyembree is optional (faster ray-casting); trimesh falls back to pure Python.
      - trimesh
      - rtree

      # Additions for Grounding DINO via Hugging Face
      - accelerate
      - huggingface_hub
      - safetensors
      - timm