name: 3d_vision
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - ffmpeg

  - pip:
      - requests==2.32.3
      - pillow==10.4.0
      - tqdm==4.66.5
      - pyyaml==6.0.2

      # Core scientific stack
      - numpy
      - scipy
      - pandas
      - matplotlib
      - jupyterlab
      - ipykernel

      # PyTorch stack
      - torch==2.11.0
      - torchvision==0.26.0

      # Vision / detection
      - opencv-python==4.13.0.92
      - transformers==5.5.3

      # 3D mesh processing / ray-casting
      - trimesh
      - rtree

      # Grounding DINO dependencies
      - accelerate
      - huggingface_hub
      - safetensors
      - timm
