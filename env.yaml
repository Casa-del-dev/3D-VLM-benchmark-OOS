name: 3d_vision
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - ffmpeg

  - pip:
      - requests==2.32.3
      - pillow==10.4.0
      - tqdm==4.66.5
      - pyyaml==6.0.2

      # Core scientific stack
      - numpy
      - scipy
      - pandas
      - matplotlib
      - jupyterlab
      - ipykernel

      # PyTorch stack
      - torch==2.11.0
      - torchvision==0.26.0

      # Vision / detection
      - opencv-python==4.13.0.92
      - transformers==5.5.3

      # 3D mesh processing / ray-casting
      - trimesh
      - rtree

      # FISHEYE624 (Aria) camera projection / un-projection
      - projectaria-tools

      # Grounding DINO dependencies
      - accelerate
      - huggingface_hub
      - safetensors
      - timm

      # Detic object detection (FIction-Detic / facebookresearch Detic).
      # The Detic and CenterNet2 packages themselves are NOT pip-installed —
      # detic_detector.py adds the sibling Detic/ checkout to sys.path at runtime.
      # These entries cover everything else Detic imports EXCEPT detectron2.
      - mss
      - fasttext
      - lvis
      - nltk
      - ftfy
      - regex
      - scikit-learn
      - git+https://github.com/openai/CLIP.git
      # detectron2 must be installed AFTER this env is created, because its
      # setup.py does `import torch` at build time and pip's isolated build
      # env does not see torch from this env. From an activated 3d_vision env:
      #     pip install --no-build-isolation 'git+https://github.com/facebookresearch/detectron2.git'
