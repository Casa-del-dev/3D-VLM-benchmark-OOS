# Visibility-track pipeline configuration.
#
# All relative paths are resolved against this file's directory
# (`scripts/visibility_track/`). Use absolute paths if the repo layout differs.

# --- Dataset paths -----------------------------------------------------------
annotations_root: ../../../hd-epic-annotations
data_root: ../../../.
intermediate_data_root: ../../../hd-epic-annotations/Intermediate_data

# --- What to process ---------------------------------------------------------
inputs:
  participants: [P01]
  videos: [P01-20240203-184045]

# --- Sampling rates ----------------------------------------------------------
# How densely we evaluate "is the object in view?" (3D projection, very cheap).
in_view_sampling_fps: 1.0

# How densely we run Grounding DINO inside the surviving
# "potentially visible" intervals. Object detection is the expensive step.
object_detection_sampling_fps: 1.0

# HD-EPIC videos are recorded at 30 fps.
video_fps: 30.0

# --- Geometric occlusion (ray-casting against digital-twin meshes) -----------
geometric_occlusion:
  enabled: true
  # Tolerance (metres) subtracted from camera→object distance to avoid
  # counting hits on the object's own surface as occlusion.
  tolerance_m: 0.05

# --- Object detection (Grounding DINO) ---------------------------------------
object_detection:
  enabled: true
  model_id: IDEA-Research/grounding-dino-tiny
  roi_scale: 2.0
  box_threshold: 0.30
  text_threshold: 0.25
  visible_threshold: 0.62
  partial_threshold: 0.28
  uncertainty_px: 40
  # Pixel fallback when the projected object has no known bbox size.
  default_expected_size_px: 120

# --- Output ------------------------------------------------------------------
output_root: ./outputs/visibility_track
random_seed: 42
