# Visibility-track pipeline configuration.
#
# All relative paths are resolved against this file's directory
# (`scripts/visibility_track/`). Use absolute paths if the repo layout differs.

# --- Dataset paths -----------------------------------------------------------
#Ivo's local paths below:
annotations_root: ../../../hd-epic-annotations
data_root: ../../../data
intermediate_data_root: ../../../hd-epic-annotations/Intermediate_data

# annotations_root: ../../hd-epic-annotations
# data_root: ../../data
# intermediate_data_root: ../../hd-epic-annotations/Intermediate_data


# --- What to process ---------------------------------------------------------
inputs:
  participants: [P04]
  videos: [P04-20240413-142619]

# --- Sampling rates ----------------------------------------------------------
# How densely we evaluate "is the object in view?" (3D projection, very cheap).
in_view_sampling_fps: 1.0

# How densely we run Grounding DINO inside the surviving
# "potentially visible" intervals. Object detection is the expensive step.
object_detection_sampling_fps: 1.0

# HD-EPIC videos are recorded at 30 fps.
video_fps: 30.0

# --- Geometric occlusion (ray-casting against digital-twin meshes) -----------
geometric_occlusion:
  enabled: true
  # Tolerance (metres) subtracted from camera→object distance to avoid
  # counting hits on the object's own surface as occlusion.
  tolerance_m: 0.10
  # If true, cast 9 rays per sample (centroid + 4 bbox corners + 4 bbox
  # edge midpoints, back-projected through the mask reference frame's
  # FISHEYE624 camera). If false (or when the 2D bbox / mask frame is
  # unavailable), fall back to a single centroid ray.
  multi_ray: true
  # Fraction-of-blocked-rays threshold to mark a sample as occluded.
  occlusion_threshold: 0.5

# --- Object detection (Grounding DINO or Detic) ---------------------------------------
# object_detection:
#   enabled: true
#   model_id: IDEA-Research/grounding-dino-base
#   roi_scale: 1.5
#   box_threshold: 0.40
#   text_threshold: 0.30
#   visible_threshold: 0.7
#   partial_threshold: 0.28
#   uncertainty_px: 20
#   # Pixel fallback when the projected object has no known bbox size.
#   default_expected_size_px: 120

object_detection:
  backend: detic

  # detic_root: /Users/fangzhouma/Desktop/3d_vision/FIction-Detic
  detic_root: /Users/ivo/Documents/ETHZ/3DVision/Detic

  # choose one model
  config_file: configs/Detic_LCOCOI21k_CLIP_SwinB_896b32_4x_ft4x_max-size.yaml
  weights: models/Detic_LCOCOI21k_CLIP_SwinB_896b32_4x_ft4x_max-size.pth

  vocabulary: custom
  device: cpu

  roi_scale: 1.8
  box_threshold: 0.25
  text_threshold: 0.25       # Grounding DINO only; ignored by Detic.
  visible_threshold: 0.5     # Per-frame score >= this -> "visible".
  partial_threshold: 0.3     # Per-frame score >= this -> "partially_visible".
  uncertainty_px: 40
  default_expected_size_px: 120

  # Interval-level verdict.
  # An interval is upgraded to "observed_visible_in_open_fixture" iff the
  # number of positive samples across the test frames is >= min_positive_samples.
  # If count_partial_as_positive is true, "partially_visible" frames count
  # toward that total alongside "visible" ones.
  min_positive_samples: 1
  count_partial_as_positive: false


# use_midpoint_boundaries: false

# --- Output ------------------------------------------------------------------
output_root: ./outputs/visibility_track
random_seed: 42
